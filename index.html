<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beartly UI Builder — v0.1</title>
<link rel="icon" type="image/png" href="icons/favicon.png">
<style>
  :root{
    --bg: #0b1f33;
    --panel: #0f2540;
    --panel-edge: rgba(140,200,255,0.16);
    --ink: #dfeeff;
    --ink-dim: #9db6d1;
    --ink-faint: #6d87a3;
    --cyan: #6fd3ff;
    --cyan-soft: rgba(111,211,255,0.14);
    --amber: #ffb454;
    --danger: #ff6b6b;
    --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{ box-sizing: border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  button{ font-family: inherit; cursor:pointer; }

  /* ---------- toolbar ---------- */
  #toolbar{
    height:52px;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 14px;
    background: var(--panel);
    border-bottom:1px solid var(--panel-edge);
  }
  .brand{
    font-family: var(--mono);
    font-size:13px;
    letter-spacing:.06em;
    color:var(--cyan);
    display:flex; align-items:center; gap:8px;
    margin-right:8px;
  }
  .brand svg{ width:22px; height:auto; flex:0 0 auto; display:block; }
  .tbtn{
    background:transparent;
    border:1px solid var(--panel-edge);
    color:var(--ink-dim);
    padding:7px 12px;
    border-radius:6px;
    font-size:12.5px;
    display:flex; align-items:center; gap:6px;
    transition: all .12s ease;
  }
  .tbtn:hover:not(:disabled){ color:var(--ink); border-color:var(--cyan); background:var(--cyan-soft); }
  .tbtn:disabled{ opacity:.35; cursor:default; }
  .tbtn.active{ color:var(--cyan); border-color:var(--cyan); background:var(--cyan-soft); }
  .tgroup{ display:flex; gap:4px; padding:0 6px; border-left:1px solid var(--panel-edge); }
  .spacer{ flex:1; }
  #file-input{ display:none; }

  /* ---------- main layout ---------- */
  #main{ flex:1; display:flex; min-height:0; }

  #left-panel, #right-panel{
    width:260px;
    flex:0 0 auto;
    background: var(--panel);
    border-right:1px solid var(--panel-edge);
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  #right-panel{ border-right:none; border-left:1px solid var(--panel-edge); }

  .panel-tabs{ display:flex; border-bottom:1px solid var(--panel-edge); flex:0 0 auto; }
  .panel-tab{
    flex:1; background:transparent; border:none; color:var(--ink-faint);
    padding:11px 0; font-size:12px; letter-spacing:.04em; text-transform:uppercase;
    border-bottom:2px solid transparent; font-family:var(--mono);
  }
  .panel-tab.active{ color:var(--cyan); border-bottom-color:var(--cyan); }
  .panel-body{ flex:1; overflow-y:auto; padding:14px; min-height:0; }
  .panel-body h4{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-faint); margin:16px 0 8px; font-weight:600; }
  .panel-body h4:first-child{ margin-top:0; }

  /* component palette */
  .palette-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .palette-item{
    background:#0c1e35; border:1px solid var(--panel-edge); border-radius:8px;
    padding:14px 8px 10px; display:flex; flex-direction:column; align-items:center; gap:6px;
    color:var(--ink-dim); font-size:11px; cursor:grab; user-select:none;
    transition: border-color .12s ease, color .12s ease;
  }
  .palette-item:hover{ border-color:var(--cyan); color:var(--ink); }
  .palette-item .glyph{ font-size:18px; color:var(--cyan); line-height:1; }
  .palette-hint{ font-size:11.5px; color:var(--ink-faint); line-height:1.5; margin-top:14px; }

  /* layers */
  .layer-row{
    display:flex; align-items:center; gap:6px;
    padding:6px 6px 6px 0; border-radius:5px; font-size:12.5px; color:var(--ink-dim);
    cursor:pointer;
  }
  .layer-row:hover{ background:rgba(255,255,255,0.04); }
  .layer-row.selected{ background:var(--cyan-soft); color:var(--cyan); }
  .layer-row .lg{ color:var(--ink-faint); font-size:13px; width:16px; text-align:center; flex:0 0 auto; }
  .layer-row .lt{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .layer-row .lactions{ display:none; gap:2px; flex:0 0 auto; }
  .layer-row:hover .lactions{ display:flex; }
  .layer-row .lactions button{
    background:none; border:none; color:var(--ink-faint); font-size:11px; padding:2px 4px; border-radius:3px;
  }
  .layer-row .lactions button:hover{ color:var(--ink); background:rgba(255,255,255,0.08); }
  .layer-children{ margin-left:16px; border-left:1px solid var(--panel-edge); padding-left:2px; }

  /* inspector */
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:11px; color:var(--ink-faint); margin-bottom:5px; text-transform:uppercase; letter-spacing:.03em; }
  .field input[type="text"], .field textarea, .field select{
    width:100%; background:#0c1e35; border:1px solid var(--panel-edge); border-radius:5px;
    color:var(--ink); padding:7px 9px; font-size:13px; font-family: var(--sans);
  }
  .field input[type="color"]{
    width:100%; height:32px; background:#0c1e35; border:1px solid var(--panel-edge); border-radius:5px; padding:2px;
  }
  .field textarea{ resize:vertical; min-height:56px; font-family: var(--mono); font-size:12.5px; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .seg{ display:flex; border:1px solid var(--panel-edge); border-radius:6px; overflow:hidden; }
  .seg button{
    flex:1; background:#0c1e35; border:none; color:var(--ink-faint); padding:7px 4px; font-size:14px;
    border-right:1px solid var(--panel-edge);
  }
  .seg button:last-child{ border-right:none; }
  .seg button.active{ background:var(--cyan-soft); color:var(--cyan); }
  .empty-inspector{ color:var(--ink-faint); font-size:13px; line-height:1.6; padding-top:20px; text-align:center; }
  .node-type-badge{
    display:inline-block; font-family:var(--mono); font-size:11px; color:var(--amber);
    background:rgba(255,180,84,0.12); padding:3px 8px; border-radius:4px; margin-bottom:14px;
  }
  .danger-btn{
    width:100%; margin-top:8px; background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.3);
    color:var(--danger); padding:8px; border-radius:6px; font-size:12.5px;
  }
  .danger-btn:hover{ background:rgba(255,107,107,0.18); }

  /* ---------- center: canvas / code ---------- */
  #center{ flex:1; display:flex; flex-direction:column; min-width:0; background: var(--bg); }

  #view-toolbar{
    flex:0 0 auto; height:42px; display:flex; align-items:center; gap:8px; padding:0 14px;
    border-bottom:1px solid var(--panel-edge);
  }
  #view-toolbar .device-group{ display:flex; gap:2px; background:var(--panel); border:1px solid var(--panel-edge); border-radius:6px; padding:2px; }
  #view-toolbar .device-group button{
    background:transparent; border:none; color:var(--ink-faint); padding:5px 9px; border-radius:4px; font-size:12px;
  }
  #view-toolbar .device-group button.active{ background:var(--cyan-soft); color:var(--cyan); }

  #canvas-viewport{
    flex:1; overflow:auto; display:flex; justify-content:center; padding:32px;
    background:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px) 0 0/24px 24px,
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px) 0 0/24px 24px;
  }
  #canvas-frame{
    position:relative;
    width:100%; max-width:1180px;
    background:#ffffff;
    box-shadow: 0 0 0 1px rgba(140,200,255,0.15), 0 24px 60px rgba(0,0,0,0.35);
    flex:0 0 auto;
    height:fit-content;
    min-height:400px;
    transition: max-width .18s ease;
  }
  #canvas-frame.device-tablet{ max-width:768px; }
  #canvas-frame.device-mobile{ max-width:375px; }

  #canvas-root{ min-height:400px; color:#1a1a1a; font-family: var(--sans); }

  .canvas-node{ position:relative; box-sizing:border-box; cursor:grab; }
  .canvas-node--root{ cursor:default; }
  .canvas-node.is-empty{ display:flex; align-items:center; justify-content:center; }
  .canvas-node.is-empty::after{
    content: attr(data-empty-label);
    color:#a9b4c2; font-size:12px; font-family: var(--mono); pointer-events:none;
  }
  .canvas-node--root.is-empty::after{ content: "Drag a component here to get started"; }
  .canvas-node:hover{ outline:1px dashed rgba(37,99,235,0.45); outline-offset:-1px; }
  .canvas-node.is-selected{ outline:2px solid #2563EB; outline-offset:-1px; }
  .canvas-node.drop-target{ outline:2px dashed var(--cyan) !important; background-color:rgba(111,211,255,0.08) !important; }
  .canvas-node--btnface{ display:inline-flex; align-items:center; justify-content:center; cursor:default; white-space:nowrap; }
  .canvas-node--inputface{ display:flex; align-items:center; color:#8892a0; background:#fff; cursor:default; }

  #selection-overlay{ position:absolute; pointer-events:none; z-index:5; display:none; }
  #selection-overlay .sel-toolbar{
    position:absolute; top:-27px; left:0; display:flex; align-items:center; gap:4px;
    background:#2563EB; border-radius:5px; padding:3px 4px; pointer-events:auto; white-space:nowrap;
  }
  #selection-overlay .sel-toolbar .type-label{ color:#fff; font-family:var(--mono); font-size:10.5px; padding:0 6px; }
  #selection-overlay .sel-toolbar button{ background:none; border:none; color:#dbe9ff; font-size:12px; padding:3px 6px; border-radius:3px; }
  #selection-overlay .sel-toolbar button:hover{ background:rgba(255,255,255,0.2); color:#fff; }
  #resize-handle{
    position:absolute; right:-5px; bottom:-5px; width:10px; height:10px;
    background:#2563EB; border:2px solid #fff; border-radius:2px; pointer-events:auto; cursor:nwse-resize;
  }

  /* code view */
  #code-view{ flex:1; display:none; overflow:auto; padding:20px 28px; }
  #code-view.active{ display:block; }
  #canvas-viewport.hidden{ display:none; }
  .code-block{ margin-bottom:20px; }
  .code-block .code-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .code-block h4{ font-family:var(--mono); font-size:12px; color:var(--cyan); text-transform:uppercase; letter-spacing:.06em; margin:0; }
  .code-block .code-actions{ display:flex; gap:6px; }
  .code-block .code-actions button{
    background:var(--panel); border:1px solid var(--panel-edge); color:var(--ink-dim); font-size:11px; padding:4px 10px; border-radius:5px;
  }
  .code-block .code-actions button:hover{ color:var(--cyan); border-color:var(--cyan); }
  .code-block pre{
    background:var(--panel); border:1px solid var(--panel-edge); border-radius:6px; padding:16px;
    font-family:var(--mono); font-size:12.5px; line-height:1.6; color:var(--ink); overflow-x:auto; margin:0;
    max-height:340px; overflow-y:auto;
  }

  /* toast */
  #toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#0f2540; border:1px solid var(--cyan); color:var(--ink); padding:9px 18px; border-radius:7px;
    font-size:12.5px; opacity:0; pointer-events:none; transition: all .2s ease; z-index:100; font-family:var(--mono);
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:rgba(140,200,255,0.2); border-radius:6px; }
  ::-webkit-scrollbar-thumb:hover{ background:rgba(140,200,255,0.35); }
</style>
</head>

    <div class="tgroup" style="border-left:none; padding-left:0;">
      <button class="tbtn" id="btn-new" title="New project">New</button>
      <button class="tbtn" id="btn-import" title="Import project JSON">Import</button>
      <input type="file" id="file-input" accept="application/json">
    </div>
    <div class="tgroup">
      <button class="tbtn" id="btn-undo" title="Undo (Ctrl+Z)">↶ Undo</button>
      <button class="tbtn" id="btn-redo" title="Redo (Ctrl+Shift+Z)">↷ Redo</button>
    </div>
    <div class="spacer"></div>
    <div class="tgroup">
      <button class="tbtn" id="btn-export-json" title="Export project as JSON">Export JSON</button>
      <button class="tbtn active" id="btn-export-html" title="Export as index.html">⬇ Export HTML</button>
    </div>
  </div>

  <div id="main">

    <div id="left-panel">
      <div class="panel-tabs">
        <button class="panel-tab active" data-tab="components">Components</button>
        <button class="panel-tab" data-tab="layers">Layers</button>
      </div>
      <div class="panel-body" id="tab-components">
        <h4>Drag onto canvas</h4>
        <div class="palette-grid" id="palette"></div>
        <p class="palette-hint">Drop a component into any container. Containers with a dashed outline accept children — drop near the top or bottom of a sibling to control ordering.</p>
      </div>
      <div class="panel-body" id="tab-layers" style="display:none;">
        <h4>Hierarchy</h4>
        <div id="layers-tree"></div>
      </div>
    </div>

    <div id="center">
      <div id="view-toolbar">
        <div class="device-group">
          <button data-view="preview" class="active">Preview</button>
          <button data-view="code">Code</button>
        </div>
        <div class="spacer"></div>
        <div class="device-group">
          <button data-device="desktop" class="active">Desktop</button>
          <button data-device="tablet">Tablet</button>
          <button data-device="mobile">Mobile</button>
        </div>
      </div>

      <div id="canvas-viewport">
        <div id="canvas-frame">
          <div id="canvas-root"></div>
          <div id="selection-overlay">
            <div class="sel-toolbar">
              <span class="type-label" id="sel-type-label"></span>
              <button id="sel-duplicate" title="Duplicate (Ctrl+D)">⧉</button>
              <button id="sel-delete" title="Delete (Del)">✕</button>
            </div>
            <div id="resize-handle"></div>
          </div>
        </div>
      </div>

      <div id="code-view">
        <div class="code-block">
          <div class="code-head">
            <h4>HTML</h4>
            <div class="code-actions">
              <button data-copy="html">Copy</button>
            </div>
          </div>
          <pre><code id="code-html"></code></pre>
        </div>
        <div class="code-block">
          <div class="code-head">
            <h4>CSS</h4>
            <div class="code-actions">
              <button data-copy="css">Copy</button>
            </div>
          </div>
          <pre><code id="code-css"></code></pre>
        </div>
      </div>
    </div>

    <div id="right-panel">
      <div class="panel-tabs">
        <button class="panel-tab active" style="cursor:default;">Inspector</button>
      </div>
      <div class="panel-body" id="inspector-body">
        <div class="empty-inspector">Select an element on the canvas<br>to edit its properties.</div>
      </div>

  <div id="toast"></div>

<script>
(function(){
  "use strict";

  /* =========================================================
     1. COMPONENT DEFINITIONS
     ========================================================= */

  var COMPONENT_DEFS = {
    Container:     { label:"Container",      glyph:"▭", canHaveChildren:true,
                     defaultLayout:{ display:"block" },
                     defaultStyle:{ padding:"16px", minHeight:"60px" } },
    FlexContainer: { label:"Flex Container",  glyph:"▤", canHaveChildren:true,
                     defaultLayout:{ display:"flex", direction:"row", justify:"flex-start", align:"stretch", gap:"12px" },
                     defaultStyle:{ padding:"16px", minHeight:"60px" } },
    Text:          { label:"Text",            glyph:"T", canHaveChildren:false,
                     defaultLayout:{},
                     defaultStyle:{ fontSize:"16px", color:"#1a1a1a" },
                     defaultContent:"Text block" },
    Button:        { label:"Button",          glyph:"▢", canHaveChildren:false,
                     defaultLayout:{ display:"inline-flex" },
                     defaultStyle:{ background:"#2563eb", color:"#ffffff", padding:"10px 20px", borderRadius:"8px", fontSize:"14px" },
                     defaultContent:"Button" },
    Image:         { label:"Image",           glyph:"▨", canHaveChildren:false,
                     defaultLayout:{},
                     defaultStyle:{ width:"280px", height:"160px", borderRadius:"6px", objectFit:"cover" },
                     defaultSrc:"https://placehold.co/280x160?text=Image" },
    Input:         { label:"Input",           glyph:"▯", canHaveChildren:false,
                     defaultLayout:{},
                     defaultStyle:{ padding:"10px 12px", borderRadius:"6px", fontSize:"14px", width:"220px" },
                     defaultPlaceholder:"Enter text..." }
  };

  var HTML_TAG = { Root:"div", Container:"div", FlexContainer:"div", Text:"p", Button:"button", Image:"img", Input:"input" };

  /* =========================================================
     2. STATE + MODEL
     ========================================================= */

  var state = {
    model: null,
    selectedId: null,
    history: [],
    historyIndex: -1,
    activeTab: "components",
    activeView: "preview",
    activeDevice: "desktop",
    dragCreateType: null,
    resizing: null
  };

  function uid(){ return "n_" + Math.random().toString(36).slice(2,9); }

  function createNode(type){
    var def = COMPONENT_DEFS[type];
    var node = {
      id: uid(),
      type: type,
      layout: JSON.parse(JSON.stringify(def.defaultLayout)),
      style: JSON.parse(JSON.stringify(def.defaultStyle)),
      meta: { locked:false, hidden:false }
    };
    if (def.canHaveChildren) node.children = [];
    if (type === "Text" || type === "Button") node.content = def.defaultContent;
    if (type === "Image") { node.src = def.defaultSrc; node.alt = "Image"; }
    if (type === "Input") { node.placeholder = def.defaultPlaceholder; node.inputType = "text"; }
    return node;
  }

  function defaultModel(){
    var root = { id:"root", type:"Root", children:[], layout:{ display:"block" }, style:{ minHeight:"500px" }, meta:{} };
    var model = { version:1, rootId:"root", nodes:{ root: root } };

    var hero = createNode("FlexContainer");
    hero.layout.justify = "space-between"; hero.layout.align = "center";
    hero.style.padding = "28px 32px";
    var heading = createNode("Text");
    heading.content = "Build your interface"; heading.style.fontSize = "22px"; heading.style.color = "#0f172a";
    var cta = createNode("Button");
    cta.content = "Get Started";

    model.nodes[hero.id] = hero;
    model.nodes[heading.id] = heading;
    model.nodes[cta.id] = cta;
    hero.children.push(heading.id, cta.id);
    root.children.push(hero.id);

    return model;
  }

  /* =========================================================
     3. MUTATION HELPERS — the only functions allowed to touch model.nodes
     ========================================================= */

  function findParentId(model, nodeId){
    for (var id in model.nodes){
      var n = model.nodes[id];
      if (n.children && n.children.indexOf(nodeId) !== -1) return id;
    }
    return null;
  }

  function isNodeOrDescendant(model, checkId, ofId){
    if (checkId === ofId) return true;
    var node = model.nodes[ofId];
    if (!node || !node.children) return false;
    for (var i=0;i<node.children.length;i++){
      if (isNodeOrDescendant(model, checkId, node.children[i])) return true;
    }
    return false;
  }

  function insertNode(model, parentId, node, index){
    model.nodes[node.id] = node;
    var arr = model.nodes[parentId].children;
    if (index == null || index > arr.length) index = arr.length;
    arr.splice(index, 0, node.id);
  }

  function removeNode(model, nodeId){
    if (nodeId === model.rootId) return;
    var parentId = findParentId(model, nodeId);
    if (parentId){
      var arr = model.nodes[parentId].children;
      var idx = arr.indexOf(nodeId);
      if (idx !== -1) arr.splice(idx, 1);
    }
    (function deleteSubtree(id){
      var node = model.nodes[id];
      if (!node) return;
      if (node.children) node.children.slice().forEach(deleteSubtree);
      delete model.nodes[id];
    })(nodeId);
  }

  function moveNode(model, nodeId, newParentId, index){
    if (nodeId === model.rootId) return;
    if (isNodeOrDescendant(model, nodeId, newParentId)) return; // can't drop into own subtree
    var oldParentId = findParentId(model, nodeId);
    if (oldParentId){
      var arr = model.nodes[oldParentId].children;
      var idx = arr.indexOf(nodeId);
      if (idx !== -1){
        arr.splice(idx, 1);
        if (oldParentId === newParentId && idx < index) index--;
      }
    }
    var targetArr = model.nodes[newParentId].children;
    if (index == null || index > targetArr.length) index = targetArr.length;
    targetArr.splice(index, 0, nodeId);
  }

  function duplicateNode(model, nodeId){
    if (nodeId === model.rootId) return null;
    var parentId = findParentId(model, nodeId);
    if (!parentId) return null;
    var idMap = {};
    function cloneSubtree(id){
      var src = model.nodes[id];
      var clone = JSON.parse(JSON.stringify(src));
      var newId = uid();
      idMap[id] = newId;
      clone.id = newId;
      if (clone.children) clone.children = clone.children.map(cloneSubtree);
      model.nodes[newId] = clone;
      return newId;
    }
    var newRootId = cloneSubtree(nodeId);
    var arr = model.nodes[parentId].children;
    var idx = arr.indexOf(nodeId);
    arr.splice(idx + 1, 0, newRootId);
    return newRootId;
  }

  /* =========================================================
     4. HISTORY (undo/redo)
     ========================================================= */

  function pushHistory(){
    var snapshot = JSON.stringify(state.model);
    state.history = state.history.slice(0, state.historyIndex + 1);
    state.history.push(snapshot);
    if (state.history.length > 60) state.history.shift();
    state.historyIndex = state.history.length - 1;
    updateHistoryButtons();
  }

  function undo(){
    if (state.historyIndex <= 0) return;
    state.historyIndex--;
    state.model = JSON.parse(state.history[state.historyIndex]);
    if (!state.model.nodes[state.selectedId]) state.selectedId = null;
    renderAll();
    scheduleAutosave();
  }

  function redo(){
    if (state.historyIndex >= state.history.length - 1) return;
    state.historyIndex++;
    state.model = JSON.parse(state.history[state.historyIndex]);
    if (!state.model.nodes[state.selectedId]) state.selectedId = null;
    renderAll();
    scheduleAutosave();
  }

  function updateHistoryButtons(){
    document.getElementById("btn-undo").disabled = state.historyIndex <= 0;
    document.getElementById("btn-redo").disabled = state.historyIndex >= state.history.length - 1;
  }

  /* =========================================================
     5. STORAGE
     ========================================================= */

  var STORAGE_KEY = "uibuilder_project_v1";
  var autosaveTimer = null;

  function scheduleAutosave(){
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(function(){
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.model)); }
      catch(e){ /* storage unavailable — fail silently, project still works this session */ }
    }, 400);
  }

  function loadFromStorage(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      if (parsed && parsed.rootId && parsed.nodes) return parsed;
    } catch(e){}
    return null;
  }

  /* =========================================================
     6. RENDER — canvas
     ========================================================= */

  function applyNodeStyles(el, node){
    var layout = node.layout || {};
    if (layout.display) el.style.display = layout.display;
    if (layout.direction) el.style.flexDirection = layout.direction;
    if (layout.justify) el.style.justifyContent = layout.justify;
    if (layout.align) el.style.alignItems = layout.align;
    if (layout.gap) el.style.gap = layout.gap;
    var style = node.style || {};
    for (var k in style){ el.style[k] = style[k]; }
  }

  function renderNode(node){
    var el = document.createElement("div");
    el.dataset.nodeId = node.id;
    el.dataset.nodeType = node.type;
    el.className = "canvas-node canvas-node--" + node.type.toLowerCase();
    applyNodeStyles(el, node);

    if (node.type === "Text"){
      el.textContent = node.content || "";
    } else if (node.type === "Button"){
      el.textContent = node.content || "";
      el.classList.add("canvas-node--btnface");
    } else if (node.type === "Image"){
      var img = document.createElement("img");
      img.src = node.src || ""; img.alt = node.alt || ""; img.draggable = false;
      img.style.width = "100%"; img.style.height = "100%";
      img.style.objectFit = (node.style && node.style.objectFit) || "cover";
      img.style.borderRadius = (node.style && node.style.borderRadius) || "0";
      img.style.pointerEvents = "none";
      el.appendChild(img);
    } else if (node.type === "Input"){
      el.classList.add("canvas-node--inputface");
      el.textContent = node.placeholder || "";
    } else {
      var kids = node.children || [];
      for (var i=0;i<kids.length;i++){
        var child = state.model.nodes[kids[i]];
        if (child) el.appendChild(renderNode(child));
      }
      if (kids.length === 0){
        el.classList.add("is-empty");
        el.dataset.emptyLabel = (COMPONENT_DEFS[node.type] ? COMPONENT_DEFS[node.type].label : "Container") + " — drop here";
      }
    }

    if (node.id === state.selectedId) el.classList.add("is-selected");
    return el;
  }

  function renderCanvas(){
    var root = state.model.nodes[state.model.rootId];
    var container = document.getElementById("canvas-root");
    container.innerHTML = "";
    container.appendChild(renderNode(root));
    positionSelectionOverlay();
  }

  function positionSelectionOverlay(){
    var overlay = document.getElementById("selection-overlay");
    if (!state.selectedId){ overlay.style.display = "none"; return; }
    var targetEl = document.querySelector('#canvas-root [data-node-id="' + state.selectedId + '"]');
    var frame = document.getElementById("canvas-frame");
    if (!targetEl){ overlay.style.display = "none"; return; }
    var tr = targetEl.getBoundingClientRect();
    var fr = frame.getBoundingClientRect();
    overlay.style.display = "block";
    overlay.style.left = (tr.left - fr.left) + "px";
    overlay.style.top = (tr.top - fr.top) + "px";
    overlay.style.width = tr.width + "px";
    overlay.style.height = tr.height + "px";
    document.getElementById("sel-type-label").textContent =
      (COMPONENT_DEFS[state.model.nodes[state.selectedId].type] || { label: "Root" }).label || "Root";
    document.getElementById("resize-handle").style.display = state.selectedId === "root" ? "none" : "block";
  }

  /* =========================================================
     7. RENDER — layers panel
     ========================================================= */

  function renderLayers(){
    var tree = document.getElementById("layers-tree");
    tree.innerHTML = "";
    tree.appendChild(renderLayerRow(state.model.nodes[state.model.rootId], 0));
  }

  function renderLayerRow(node, depth){
    var wrap = document.createElement("div");

    var row = document.createElement("div");
    row.className = "layer-row" + (node.id === state.selectedId ? " selected" : "");
    row.dataset.nodeId = node.id;

    var glyph = document.createElement("span");
    glyph.className = "lg";
    glyph.textContent = node.id === "root" ? "◆" : (COMPONENT_DEFS[node.type] ? COMPONENT_DEFS[node.type].glyph : "•");
    row.appendChild(glyph);

    var label = document.createElement("span");
    label.className = "lt";
    label.textContent = node.id === "root" ? "Page" : ((COMPONENT_DEFS[node.type] || {}).label || node.type) +
      (node.content ? ": " + node.content.slice(0,18) : "");
    row.appendChild(label);

    if (node.id !== "root"){
      var actions = document.createElement("span");
      actions.className = "lactions";
      var dup = document.createElement("button"); dup.textContent = "⧉"; dup.title = "Duplicate";
      dup.addEventListener("click", function(e){ e.stopPropagation(); doDuplicate(node.id); });
      var del = document.createElement("button"); del.textContent = "✕"; del.title = "Delete";
      del.addEventListener("click", function(e){ e.stopPropagation(); doDelete(node.id); });
      actions.appendChild(dup); actions.appendChild(del);
      row.appendChild(actions);
    }

    row.addEventListener("click", function(e){ e.stopPropagation(); selectNode(node.id); });
    wrap.appendChild(row);

    if (node.children && node.children.length){
      var childWrap = document.createElement("div");
      childWrap.className = "layer-children";
      node.children.forEach(function(cid){
        var child = state.model.nodes[cid];
        if (child) childWrap.appendChild(renderLayerRow(child, depth+1));
      });
      wrap.appendChild(childWrap);
    }
    return wrap;
  }

  /* =========================================================
     8. RENDER — inspector
     ========================================================= */

  function fieldRow(labelText, innerHtml){
    return '<div class="field"><label>' + labelText + '</label>' + innerHtml + '</div>';
  }

  function textField(labelText, fieldPath, value){
    return fieldRow(labelText, '<input type="text" data-field="' + fieldPath + '" value="' + (value==null?"":String(value).replace(/"/g,'&quot;')) + '">');
  }

  function colorField(labelText, fieldPath, value){
    var v = /^#[0-9a-fA-F]{3,6}$/.test(value) ? value : "#000000";
    return fieldRow(labelText, '<input type="color" data-field="' + fieldPath + '" value="' + v + '">');
  }

  function textareaField(labelText, fieldPath, value){
    return fieldRow(labelText, '<textarea data-field="' + fieldPath + '">' + (value==null?"":String(value)) + '</textarea>');
  }

  function segField(labelText, fieldPath, options, current){
    var html = '<div class="seg" data-seg-field="' + fieldPath + '">';
    options.forEach(function(opt){
      html += '<button type="button" data-value="' + opt.value + '" class="' + (opt.value===current?"active":"") + '">' + opt.icon + '</button>';
    });
    html += '</div>';
    return fieldRow(labelText, html);
  }

  function renderInspector(){
    var body = document.getElementById("inspector-body");
    if (!state.selectedId){
      body.innerHTML = '<div class="empty-inspector">Select an element on the canvas<br>to edit its properties.</div>';
      return;
    }
    var node = state.model.nodes[state.selectedId];
    if (!node){ body.innerHTML = ''; return; }

    var isRoot = node.id === "root";
    var isFlex = node.layout && node.layout.display === "flex";
    var html = '<div class="node-type-badge">' + (isRoot ? "Root / Page" : (COMPONENT_DEFS[node.type]||{}).label) + '</div>';

    if (node.type === "Text" || node.type === "Button"){
      html += textareaField("Content", "content", node.content);
    }
    if (node.type === "Image"){
      html += textField("Image URL", "src", node.src);
      html += textField("Alt text", "alt", node.alt);
    }
    if (node.type === "Input"){
      html += textField("Placeholder", "placeholder", node.placeholder);
    }

    html += '<h4>Layout</h4>';
    if (!isRoot){
      html += segField("Display", "layout.display", [
        { value:"block", icon:"▭" }, { value:"flex", icon:"▤" }, { value:"inline-flex", icon:"▫" }
      ], node.layout.display || "block");
    }
    if (isFlex){
      html += segField("Direction", "layout.direction", [{value:"row",icon:"→"},{value:"column",icon:"↓"}], node.layout.direction || "row");
      html += segField("Justify", "layout.justify", [
        {value:"flex-start",icon:"⇤"},{value:"center",icon:"⇔"},{value:"flex-end",icon:"⇥"},{value:"space-between",icon:"⇹"}
      ], node.layout.justify || "flex-start");
      html += segField("Align", "layout.align", [
        {value:"flex-start",icon:"⤒"},{value:"center",icon:"⇕"},{value:"flex-end",icon:"⤓"},{value:"stretch",icon:"⬍"}
      ], node.layout.align || "stretch");
      html += textField("Gap", "layout.gap", node.layout.gap);
    }

    html += '<h4>Size &amp; Spacing</h4>';
    html += '<div class="field-row">' +
      textField("Width", "style.width", node.style.width) +
      textField("Height", "style.height", node.style.height) +
    '</div>';
    html += textField("Padding", "style.padding", node.style.padding);
    if (!isRoot) html += textField("Margin", "style.margin", node.style.margin);

    html += '<h4>Appearance</h4>';
    html += colorField("Background", "style.background", node.style.background || "#ffffff");
    if (node.type === "Text" || node.type === "Button"){
      html += colorField("Text color", "style.color", node.style.color || "#000000");
      html += textField("Font size", "style.fontSize", node.style.fontSize);
    }
    html += textField("Border radius", "style.borderRadius", node.style.borderRadius);

    if (!isRoot){
      html += '<button class="danger-btn" id="btn-delete-selected">Delete element</button>';
    }

    body.innerHTML = html;
  }

  /* =========================================================
     9. INSPECTOR EVENT WIRING (delegated)
     ========================================================= */

  function applyFieldValue(node, fieldPath, value){
    if (fieldPath.indexOf("style.") === 0){
      node.style[fieldPath.slice(6)] = value;
    } else if (fieldPath.indexOf("layout.") === 0){
      var key = fieldPath.slice(7);
      if (value === "") delete node.layout[key]; else node.layout[key] = value;
    } else {
      node[fieldPath] = value;
    }
  }

  document.getElementById("inspector-body").addEventListener("input", function(e){
    var el = e.target.closest("[data-field]");
    if (!el) return;
    var node = state.model.nodes[state.selectedId];
    if (!node) return;
    applyFieldValue(node, el.dataset.field, el.value);
    renderCanvas(); renderLayers(); scheduleAutosave(); refreshCodeViewIfActive();
  });

  document.getElementById("inspector-body").addEventListener("change", function(e){
    var el = e.target.closest("[data-field]");
    if (!el) return;
    pushHistory();
  });

  document.getElementById("inspector-body").addEventListener("click", function(e){
    var seg = e.target.closest(".seg button");
    if (seg){
      var group = seg.closest("[data-seg-field]");
      var node = state.model.nodes[state.selectedId];
      if (!node) return;
      applyFieldValue(node, group.dataset.segField, seg.dataset.value);
      pushHistory();
      renderAll();
      refreshCodeViewIfActive();
      return;
    }
    if (e.target.id === "btn-delete-selected"){
      doDelete(state.selectedId);
    }
  });

  /* =========================================================
     10. SELECTION
     ========================================================= */

  function selectNode(id){
    state.selectedId = id;
    renderCanvas();
    renderLayers();
    renderInspector();
  }

  document.getElementById("canvas-root").addEventListener("click", function(e){
    var target = e.target.closest("[data-node-id]");
    if (!target) return;
    e.stopPropagation();
    selectNode(target.dataset.nodeId);
  });

  document.getElementById("canvas-viewport").addEventListener("click", function(e){
    if (e.target.id === "canvas-viewport"){
      state.selectedId = null;
      renderCanvas(); renderLayers(); renderInspector();
    }
  });

  document.getElementById("sel-delete").addEventListener("click", function(){ doDelete(state.selectedId); });
  document.getElementById("sel-duplicate").addEventListener("click", function(){ doDuplicate(state.selectedId); });

  function doDelete(id){
    if (!id || id === "root") return;
    removeNode(state.model, id);
    if (state.selectedId === id) state.selectedId = null;
    pushHistory();
    renderAll();
    scheduleAutosave();
    refreshCodeViewIfActive();
  }

  function doDuplicate(id){
    if (!id || id === "root") return;
    var newId = duplicateNode(state.model, id);
    if (newId){ state.selectedId = newId; pushHistory(); renderAll(); scheduleAutosave(); refreshCodeViewIfActive(); }
  }

  /* =========================================================
     11. DRAG FROM PALETTE (create) + FREE-POSITION DRAG ON CANVAS (move)
     ========================================================= */

  // Finds the nearest container element under the cursor. Pass excludeId
  // when dragging an existing node so it can't be dropped into itself or
  // one of its own descendants.
  function getContainerElAt(clientX, clientY, excludeId){
    var els = document.elementsFromPoint(clientX, clientY);
    for (var i=0;i<els.length;i++){
      var el = els[i];
      if (el.dataset && el.dataset.nodeId){
        var node = state.model.nodes[el.dataset.nodeId];
        if (node && (node.children !== undefined)){
          if (excludeId && isNodeOrDescendant(state.model, el.dataset.nodeId, excludeId)) continue;
          return el;
        }
      }
    }
    return document.getElementById("canvas-root").firstElementChild; // fallback: root
  }

  function clearDropHighlights(){
    var els = document.querySelectorAll(".drop-target");
    els.forEach(function(el){ el.classList.remove("drop-target"); });
  }

  // -- palette items: dragstart (creating a brand new element) --
  function buildPalette(){
    var palette = document.getElementById("palette");
    Object.keys(COMPONENT_DEFS).forEach(function(type){
      var def = COMPONENT_DEFS[type];
      var item = document.createElement("div");
      item.className = "palette-item";
      item.draggable = true;
      item.innerHTML = '<span class="glyph">' + def.glyph + '</span><span>' + def.label + '</span>';
      item.addEventListener("dragstart", function(e){
        state.dragCreateType = type;
        e.dataTransfer.effectAllowed = "copy";
        e.dataTransfer.setData("text/plain", type);
      });
      palette.appendChild(item);
    });
  }

  var canvasRootEl = document.getElementById("canvas-root");

  canvasRootEl.addEventListener("dragover", function(e){
    if (!state.dragCreateType) return;
    e.preventDefault();
    var containerEl = getContainerElAt(e.clientX, e.clientY);
    clearDropHighlights();
    if (containerEl) containerEl.classList.add("drop-target");
  });

  // Dropping a NEW component from the palette places it at the exact
  // cursor position (absolute, freeform) rather than inserting it into
  // document flow — this is what lets it land wherever you drop it.
  canvasRootEl.addEventListener("drop", function(e){
    e.preventDefault();
    clearDropHighlights();
    if (!state.dragCreateType) return;
    var containerEl = getContainerElAt(e.clientX, e.clientY);
    if (!containerEl) return;
    var containerId = containerEl.dataset.nodeId;
    var containerRect = containerEl.getBoundingClientRect();

    var node = createNode(state.dragCreateType);
    node.style.position = "absolute";
    node.style.left = Math.max(0, Math.round(e.clientX - containerRect.left - 10)) + "px";
    node.style.top = Math.max(0, Math.round(e.clientY - containerRect.top - 10)) + "px";

    insertNode(state.model, containerId, node);
    state.selectedId = node.id;
    state.dragCreateType = null;
    pushHistory(); renderAll(); scheduleAutosave(); refreshCodeViewIfActive();
  });

  document.addEventListener("dragend", function(){
    state.dragCreateType = null;
    clearDropHighlights();
  });

  // -- moving EXISTING canvas elements: free positioning anywhere in the canvas --
  // Implemented with plain mouse events (not the HTML5 drag API) so the
  // element can follow the cursor continuously and land at any x/y —
  // not just snap into flow order.
  var moveDrag = null;
  var MOVE_THRESHOLD = 4; // px of movement before a mousedown counts as a drag rather than a click

  canvasRootEl.addEventListener("mousedown", function(e){
    var target = e.target.closest("[data-node-id]");
    if (!target || target.dataset.nodeId === "root") return;
    var nodeId = target.dataset.nodeId;
    var node = state.model.nodes[nodeId];
    if (!node || (node.meta && node.meta.locked)) return;

    var parentId = findParentId(state.model, nodeId) || state.model.rootId;
    var parentEl = document.querySelector('#canvas-root [data-node-id="' + parentId + '"]');
    if (!parentEl) return;

    var elRect = target.getBoundingClientRect();
    var parentRect = parentEl.getBoundingClientRect();

    moveDrag = {
      id: nodeId,
      parentId: parentId,
      hoverContainerId: parentId,
      startClientX: e.clientX,
      startClientY: e.clientY,
      offsetX: e.clientX - elRect.left,
      offsetY: e.clientY - elRect.top,
      originLeft: elRect.left - parentRect.left,
      originTop: elRect.top - parentRect.top,
      moved: false
    };

    document.addEventListener("mousemove", onCanvasMoveDrag);
    document.addEventListener("mouseup", onCanvasMoveDrop);
  });

  function onCanvasMoveDrag(e){
    if (!moveDrag) return;
    var dx = e.clientX - moveDrag.startClientX;
    var dy = e.clientY - moveDrag.startClientY;

    if (!moveDrag.moved){
      if (Math.abs(dx) < MOVE_THRESHOLD && Math.abs(dy) < MOVE_THRESHOLD) return;
      moveDrag.moved = true;
      document.body.style.cursor = "grabbing";
    }

    var node = state.model.nodes[moveDrag.id];
    if (!node) return;

    // Reposition relative to the ORIGINAL parent while dragging — this keeps
    // the motion smooth and 1:1 with the cursor even while hovering over
    // other containers. Reparenting (if any) is resolved once, on drop.
    node.style.position = "absolute";
    node.style.left = Math.round(moveDrag.originLeft + dx) + "px";
    node.style.top = Math.round(moveDrag.originTop + dy) + "px";
    renderCanvas();

    clearDropHighlights();
    var hoverEl = getContainerElAt(e.clientX, e.clientY, moveDrag.id);
    if (hoverEl){
      hoverEl.classList.add("drop-target");
      moveDrag.hoverContainerId = hoverEl.dataset.nodeId;
    }
  }

  function onCanvasMoveDrop(e){
    document.removeEventListener("mousemove", onCanvasMoveDrag);
    document.removeEventListener("mouseup", onCanvasMoveDrop);
    document.body.style.cursor = "";
    clearDropHighlights();
    if (!moveDrag) return;

    var wasMoved = moveDrag.moved;
    var nodeId = moveDrag.id;
    var originalParentId = moveDrag.parentId;
    var finalContainerId = moveDrag.hoverContainerId || originalParentId;

    if (wasMoved){
      var node = state.model.nodes[nodeId];
      if (node && finalContainerId !== originalParentId){
        // Dropped over a different container — reparent, then recompute
        // left/top relative to that container's own coordinate frame.
        var newParentEl = document.querySelector('#canvas-root [data-node-id="' + finalContainerId + '"]');
        if (newParentEl){
          var newParentRect = newParentEl.getBoundingClientRect();
          node.style.left = Math.max(0, Math.round(e.clientX - newParentRect.left - moveDrag.offsetX)) + "px";
          node.style.top = Math.max(0, Math.round(e.clientY - newParentRect.top - moveDrag.offsetY)) + "px";
        }
        moveNode(state.model, nodeId, finalContainerId);
      }
      state.selectedId = nodeId;
      pushHistory();
      renderAll();
      scheduleAutosave();
      refreshCodeViewIfActive();
    } else {
      // No real movement — treat it as a plain click-to-select.
      selectNode(nodeId);
    }
    moveDrag = null;
  }

  /* =========================================================
     12. RESIZE HANDLE
     ========================================================= */

  document.getElementById("resize-handle").addEventListener("mousedown", function(e){
    e.preventDefault(); e.stopPropagation();
    var targetEl = document.querySelector('#canvas-root [data-node-id="' + state.selectedId + '"]');
    if (!targetEl) return;
    var startRect = targetEl.getBoundingClientRect();
    state.resizing = { id: state.selectedId, startX: e.clientX, startY: e.clientY, startW: startRect.width, startH: startRect.height };

    function onMove(ev){
      if (!state.resizing) return;
      var dx = ev.clientX - state.resizing.startX;
      var dy = ev.clientY - state.resizing.startY;
      var node = state.model.nodes[state.resizing.id];
      if (!node) return;
      node.style.width = Math.max(20, Math.round(state.resizing.startW + dx)) + "px";
      node.style.height = Math.max(20, Math.round(state.resizing.startH + dy)) + "px";
      renderCanvas();
    }
    function onUp(){
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      if (state.resizing){ state.resizing = null; pushHistory(); renderInspector(); scheduleAutosave(); refreshCodeViewIfActive(); }
    }
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });

  window.addEventListener("resize", positionSelectionOverlay);
  document.getElementById("canvas-viewport").addEventListener("scroll", positionSelectionOverlay);

  /* =========================================================
     13. CODE GENERATION
     ========================================================= */

  function camelToKebab(s){ return s.replace(/[A-Z]/g, function(m){ return "-" + m.toLowerCase(); }); }

  function escapeHtml(s){
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function nodeCssRules(node){
    var props = {};
    var layout = node.layout || {};
    if (layout.display) props.display = layout.display;
    if (layout.direction) props["flex-direction"] = layout.direction;
    if (layout.justify) props["justify-content"] = layout.justify;
    if (layout.align) props["align-items"] = layout.align;
    if (layout.gap) props.gap = layout.gap;
    var style = node.style || {};
    for (var k in style){ props[camelToKebab(k)] = style[k]; }
    // Any container holding a freely-positioned (absolute) child needs to be
    // a positioning context itself, or that child would place itself relative
    // to the page instead of relative to its actual parent.
    if (node.children && !props.position){
      var hasAbsoluteChild = node.children.some(function(cid){
        var c = state.model.nodes[cid];
        return c && c.style && c.style.position === "absolute";
      });
      if (hasAbsoluteChild) props.position = "relative";
    }
    var decls = Object.keys(props).map(function(p){ return "  " + p + ": " + props[p] + ";"; }).join("\n");
    if (!decls) return "";
    return "." + "el-" + node.id + " {\n" + decls + "\n}\n";
  }

  function nodeHtml(node, indent){
    var pad = new Array(indent + 1).join("  ");
    var cls = node.id === state.model.rootId ? "page" : "el-" + node.id;
    var tag = HTML_TAG[node.type] || "div";

    if (node.type === "Image"){
      return pad + '<img class="' + cls + '" src="' + escapeHtml(node.src) + '" alt="' + escapeHtml(node.alt) + '">\n';
    }
    if (node.type === "Input"){
      return pad + '<input class="' + cls + '" type="' + escapeHtml(node.inputType || "text") + '" placeholder="' + escapeHtml(node.placeholder) + '">\n';
    }
    if (node.type === "Text"){
      return pad + '<p class="' + cls + '">' + escapeHtml(node.content) + '</p>\n';
    }
    if (node.type === "Button"){
      return pad + '<button class="' + cls + '" type="button">' + escapeHtml(node.content) + '</button>\n';
    }
    var inner = (node.children || []).map(function(cid){
      var child = state.model.nodes[cid];
      return child ? nodeHtml(child, indent + 1) : "";
    }).join("");
    return pad + '<' + tag + ' class="' + cls + '">\n' + inner + pad + '</' + tag + '>\n';
  }

  function generateCss(){
    var css = "* { box-sizing: border-box; }\nbody { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }\n.page { min-height: 100vh; }\n\n";
    Object.keys(state.model.nodes).forEach(function(id){
      var node = state.model.nodes[id];
      var rule = nodeCssRules(node);
      if (rule) css += rule + "\n";
    });
    return css.trim() + "\n";
  }

  function generateHtmlBody(){
    return nodeHtml(state.model.nodes[state.model.rootId], 0);
  }

  function generateFullDocument(){
    return "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Exported Page</title>\n<style>\n" +
      generateCss() + "</style>\n</head>\n<body>\n" + generateHtmlBody() + "</body>\n</html>\n";
  }

  function refreshCodeViewIfActive(){
    if (state.activeView !== "code") return;
    document.getElementById("code-html").textContent = generateHtmlBody();
    document.getElementById("code-css").textContent = generateCss();
  }

  /* =========================================================
     14. TOAST
     ========================================================= */

  var toastTimer = null;
  function showToast(msg){
    var toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toast.classList.remove("show"); }, 1800);
  }

  /* =========================================================
     15. TOOLBAR / VIEW / DEVICE WIRING
     ========================================================= */

  document.getElementById("btn-undo").addEventListener("click", undo);
  document.getElementById("btn-redo").addEventListener("click", redo);

  document.getElementById("btn-new").addEventListener("click", function(){
    if (!confirm("Start a new project? Unsaved changes in this project will be lost.")) return;
    state.model = defaultModel();
    state.selectedId = null;
    state.history = []; state.historyIndex = -1;
    pushHistory(); renderAll(); scheduleAutosave(); refreshCodeViewIfActive();
  });

  document.getElementById("btn-export-json").addEventListener("click", function(){
    downloadFile("project.json", JSON.stringify(state.model, null, 2), "application/json");
    showToast("Project exported as project.json");
  });

  document.getElementById("btn-export-html").addEventListener("click", function(){
    downloadFile("index.html", generateFullDocument(), "text/html");
    showToast("Exported index.html — ready to deploy");
  });

  document.getElementById("btn-import").addEventListener("click", function(){
    document.getElementById("file-input").click();
  });

  document.getElementById("file-input").addEventListener("change", function(e){
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var parsed = JSON.parse(reader.result);
        if (!parsed.rootId || !parsed.nodes) throw new Error("Invalid project file");
        state.model = parsed;
        state.selectedId = null;
        state.history = []; state.historyIndex = -1;
        pushHistory(); renderAll(); scheduleAutosave(); refreshCodeViewIfActive();
        showToast("Project imported");
      } catch(err){
        showToast("Could not read that file as a project");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  function downloadFile(filename, content, mime){
    var blob = new Blob([content], { type: mime });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 500);
  }

  document.querySelectorAll(".panel-tab[data-tab]").forEach(function(tab){
    tab.addEventListener("click", function(){
      document.querySelectorAll(".panel-tab[data-tab]").forEach(function(t){ t.classList.remove("active"); });
      tab.classList.add("active");
      state.activeTab = tab.dataset.tab;
      document.getElementById("tab-components").style.display = state.activeTab === "components" ? "block" : "none";
      document.getElementById("tab-layers").style.display = state.activeTab === "layers" ? "block" : "none";
    });
  });

  document.querySelectorAll("[data-view]").forEach(function(btn){
    btn.addEventListener("click", function(){
      document.querySelectorAll("[data-view]").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      state.activeView = btn.dataset.view;
      var codeView = document.getElementById("code-view");
      var canvasViewport = document.getElementById("canvas-viewport");
      if (state.activeView === "code"){
        codeView.classList.add("active");
        canvasViewport.classList.add("hidden");
        refreshCodeViewIfActive();
      } else {
        codeView.classList.remove("active");
        canvasViewport.classList.remove("hidden");
      }
    });
  });

  document.querySelectorAll("[data-device]").forEach(function(btn){
    btn.addEventListener("click", function(){
      document.querySelectorAll("[data-device]").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      state.activeDevice = btn.dataset.device;
      var frame = document.getElementById("canvas-frame");
      frame.classList.remove("device-tablet", "device-mobile");
      if (state.activeDevice === "tablet") frame.classList.add("device-tablet");
      if (state.activeDevice === "mobile") frame.classList.add("device-mobile");
      setTimeout(positionSelectionOverlay, 200);
    });
  });

  document.querySelectorAll('[data-copy]').forEach(function(btn){
    btn.addEventListener("click", function(){
      var id = btn.dataset.copy === "html" ? "code-html" : "code-css";
      var text = document.getElementById(id).textContent;
      if (navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){ showToast("Copied to clipboard"); });
      }
    });
  });

  /* =========================================================
     16. KEYBOARD SHORTCUTS
     ========================================================= */

  document.addEventListener("keydown", function(e){
    var tag = (e.target.tagName || "").toLowerCase();
    if (tag === "input" || tag === "textarea" || tag === "select") return;

    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "z" && !e.shiftKey){ e.preventDefault(); undo(); return; }
    if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === "y" || (e.key.toLowerCase() === "z" && e.shiftKey))){ e.preventDefault(); redo(); return; }
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "d"){ e.preventDefault(); if (state.selectedId) doDuplicate(state.selectedId); return; }
    if ((e.key === "Delete" || e.key === "Backspace") && state.selectedId){ e.preventDefault(); doDelete(state.selectedId); return; }
  });

  /* =========================================================
     17. INIT
     ========================================================= */

  function renderAll(){
    renderCanvas();
    renderLayers();
    renderInspector();
    updateHistoryButtons();
  }

  function init(){
    buildPalette();
    var loaded = loadFromStorage();
    state.model = loaded || defaultModel();
    pushHistory();
    renderAll();
  }

  init();

})();
</script>

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => { console.log("Service Worker Registered"); })
      .catch((err) => { console.error("Service Worker Failed", err); });
  });
}
</script>
